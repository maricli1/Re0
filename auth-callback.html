<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Discord 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #1a1625; color: #dcd1ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .card { max-width: 500px; width: 100%; }
    .status { font-size: 1.15em; margin: 0 0 10px; }
    .err { color: #ff6b6b; }
    .ok { color: #6bff8a; }
    .info { color: #8070a8; font-size: 0.82em; margin: 3px 0; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <p id="status" class="status">⏳ 正在完成登录...</p>
    <p id="detail" class="info"></p>
  </div>
  <script>
    (function() {
      var status = document.getElementById('status');
      var detail = document.getElementById('detail');

      // Parse 后端配置（与 api.ts 保持一致）
      var PARSE_BASE = 'https://parseapi.back4app.com';
      var PARSE_APP_ID = 'tHvxkLC75XEiizyeMnzHzUnqgQdc9xX88wLs2NJY';
      var PARSE_JS_KEY = 'N2qWOhR9Wj2gwbnXyWSPBaChak9bmSZ4R7LR6fPL';

      function finish(ok, text) {
        status.textContent = (ok ? '✅ ' : '❌ ') + text;
        status.className = ok ? 'status ok' : 'status err';
        if (ok) detail.textContent = '窗口正在关闭...';
        setTimeout(function() { window.close(); }, ok ? 400 : 2000);
      }

      // 途径 1: postMessage 给 opener（Chrome/Firefox 毫秒级快速通道）
      function sendViaPostMessage(type, payload) {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: type, payload: payload }, '*');
            return true;
          }
        } catch(e) {}
        return false;
      }

      // 途径 2: 通过 Parse 后端中继（Safari/移动端后备通道）
      function sendViaParse(sessionId, userData) {
        return fetch(PARSE_BASE + '/functions/completeAuthSession', {
          method: 'POST',
          headers: {
            'X-Parse-Application-Id': PARSE_APP_ID,
            'X-Parse-JavaScript-Key': PARSE_JS_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ sessionId: sessionId, userData: userData }),
        }).then(function(r) { return r.json(); });
      }

      try {
        var hash = window.location.hash.substring(1);
        var p = new URLSearchParams(hash);
        var token = p.get('access_token'), tt = p.get('token_type');
        var err = p.get('error'), errDesc = p.get('error_description');
        var state = p.get('state'); // sessionId，由 discordAuth.ts 传入

        if (err) {
          sendViaPostMessage('SAVE_ERROR', err + (errDesc ? ': ' + errDesc : ''));
          finish(false, err + (errDesc ? ': ' + errDesc : ''));
          return;
        }
        if (!token) {
          sendViaPostMessage('SAVE_ERROR', '未收到授权令牌');
          finish(false, '未收到授权令牌');
          return;
        }

        fetch('https://discord.com/api/v10/users/@me', {
          headers: { Authorization: (tt || 'Bearer') + ' ' + token }
        }).then(function(r) {
          return r.json().then(function(b) {
            if (!r.ok) throw new Error(b.message || b.error || 'HTTP ' + r.status);
            return b;
          });
        }).then(function(user) {
          // 同时尝试两种途径发送数据
          var sentViaOpener = sendViaPostMessage('SAVE_DATA', user);

          if (state) {
            // 有 sessionId：同时走 Parse 后备通道（并行，不阻塞）
            sendViaParse(state, user).then(function() {
              if (!sentViaOpener) {
                // opener 不可用时，Parse 通道是唯一途径
                detail.textContent = '通过备用通道完成登录';
              }
            }).catch(function(e) {
              console.warn('[auth-callback] Parse 中继失败:', e);
              if (!sentViaOpener) {
                finish(false, '所有登录通道均失败，请重试');
                return;
              }
            });
          } else if (!sentViaOpener) {
            // 无 sessionId 且 opener 不可用 = 无法完成登录
            finish(false, '浏览器不支持弹窗通信，请尝试使用 Chrome');
            return;
          }

          finish(true, user.username);
        }).catch(function(e) {
          sendViaPostMessage('SAVE_ERROR', e.message);
          finish(false, e.message);
        });
      } catch(e) {
        sendViaPostMessage('SAVE_ERROR', e.message);
        finish(false, e.message);
      }
    })();
  </script>
</body>
</html>
