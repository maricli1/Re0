<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Discord 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #1a1625; color: #dcd1ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .card { max-width: 500px; width: 100%; }
    .status { font-size: 1.15em; margin: 0 0 10px; }
    .err { color: #ff6b6b; }
    .ok { color: #6bff8a; }
    .info { color: #8070a8; font-size: 0.82em; margin: 3px 0; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <p id="status" class="status">⏳ 正在完成登录...</p>
    <p id="detail" class="info"></p>
  </div>
  <script>
    (function() {
      var status = document.getElementById('status');
      var detail = document.getElementById('detail');

      // Parse 后端配置
      var PARSE_BASE = 'https://parseapi.back4app.com';
      var PARSE_APP_ID = 'tHvxkLC75XEiizyeMnzHzUnqgQdc9xX88wLs2NJY';
      var PARSE_JS_KEY = 'N2qWOhR9Wj2gwbnXyWSPBaChak9bmSZ4R7LR6fPL';

      function finish(ok, text) {
        status.textContent = (ok ? '✅ ' : '❌ ') + text;
        status.className = ok ? 'status ok' : 'status err';
        if (ok) detail.textContent = '窗口正在关闭...';
        setTimeout(function() { window.close(); }, ok ? 600 : 3000);
      }

      // 通过 Parse 中继用户数据给 workshop 页面
      function sendViaParse(sessionId, userData) {
        return fetch(PARSE_BASE + '/functions/completeAuthSession', {
          method: 'POST',
          headers: {
            'X-Parse-Application-Id': PARSE_APP_ID,
            'X-Parse-JavaScript-Key': PARSE_JS_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ sessionId: sessionId, userData: userData }),
        }).then(function(r) { return r.json(); });
      }

      try {
        var hash = window.location.hash.substring(1);
        var p = new URLSearchParams(hash);
        var token = p.get('access_token'), tt = p.get('token_type');
        var err = p.get('error'), errDesc = p.get('error_description');
        var state = p.get('state'); // sessionId

        if (err) {
          finish(false, err + (errDesc ? ': ' + errDesc : ''));
          return;
        }
        if (!token) {
          finish(false, '未收到授权令牌');
          return;
        }

        // 获取 Discord 用户信息
        fetch('https://discord.com/api/v10/users/@me', {
          headers: { Authorization: (tt || 'Bearer') + ' ' + token }
        }).then(function(r) {
          return r.json().then(function(b) {
            if (!r.ok) throw new Error(b.message || b.error || 'HTTP ' + r.status);
            return b;
          });
        }).then(function(user) {
          if (!state) {
            finish(false, '缺少会话标识，无法完成登录');
            return;
          }

          // 通过 Parse 中继用户数据给 workshop 页面
          detail.textContent = '正在通过服务端中继...';
          sendViaParse(state, user).then(function() {
            finish(true, user.username);
          }).catch(function(e) {
            console.warn('[auth-callback] Parse 中继失败:', e);
            finish(false, '服务端通信失败，请重试');
          });
        }).catch(function(e) {
          finish(false, e.message);
        });
      } catch(e) {
        finish(false, e.message);
      }
    })();
  </script>
</body>
</html>
