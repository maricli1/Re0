<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Discord 登录</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #1a1625; color: #dcd1ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .card { max-width: 500px; width: 100%; }
    .status { font-size: 1.15em; margin: 0 0 10px; }
    .err { color: #ff6b6b; }
    .ok { color: #6bff8a; }
    .info { color: #8070a8; font-size: 0.82em; margin: 3px 0; word-break: break-all; }
    .hint { margin-top: 14px; padding: 10px; background: rgba(255,152,0,0.12); border: 1px solid rgba(255,152,0,0.25); border-radius: 6px; font-size: 0.78em; color: #ffb74d; line-height: 1.5; text-align: left; }
    .hint code { background: rgba(0,0,0,0.4); padding: 1px 5px; border-radius: 3px; font-size: 0.95em; }
    .debug { margin-top: 14px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 0.7em; text-align: left; word-break: break-all; color: #5a5a7a; max-height: 180px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="card">
    <p id="status" class="status">⏳ 正在完成登录...</p>
    <p id="detail" class="info"></p>
    <div id="hint" class="hint" style="display:none"></div>
    <pre id="debug" class="debug" style="display:none"></pre>
  </div>
  <script>
    (function() {
      var status = document.getElementById('status');
      var detail = document.getElementById('detail');
      var hintEl  = document.getElementById('hint');
      var debugEl = document.getElementById('debug');
      var logs = [];

      function log(msg) { logs.push(msg); debugEl.style.display='block'; debugEl.textContent=logs.join('\n'); }

      // ---- send result back to opener ----
      function sendToOpener(data) {
        log('Sending to opener: ' + JSON.stringify(Object.keys(data)));
        // 兜底方案：写 localStorage，opener 可以轮询读取
        try {
          if (data.user) {
            localStorage.setItem('discord_workshop_pending', JSON.stringify(data.user));
            log('localStorage backup written');
          }
        } catch(e) { log('localStorage write failed: ' + e.message); }
        // 主方案：postMessage
        try {
          if (window.opener && window.opener !== window && !window.opener.closed) {
            window.opener.postMessage({ type: 'discord_auth_result', ...data }, '*');
            log('postMessage sent to opener');
          }
        } catch(e) { log('postMessage failed: ' + e.message); }
      }

      try {
        log('Callback URL: ' + window.location.href);

        var hash = window.location.hash.substring(1);
        log('Hash: ' + (hash || '(EMPTY)'));

        var params = new URLSearchParams(hash);
        var accessToken = params.get('access_token');
        var tokenType    = params.get('token_type');
        var error        = params.get('error');
        var errorDesc    = params.get('error_description');
        var state        = params.get('state');

        log('access_token: ' + (accessToken ? accessToken.substring(0,10)+'...' : 'NONE'));
        log('token_type: ' + (tokenType || 'NONE'));
        log('error: ' + (error || 'NONE'));
        log('error_description: ' + (errorDesc || 'NONE'));
        log('state: ' + (state || 'NONE'));

        // ---- Discord 返回了错误 ----
        if (error) {
          status.textContent = '❌ Discord 授权失败: ' + error;
          status.className = 'status err';
          detail.textContent = errorDesc || '';
          log('DISCORD OAUTH ERROR: ' + error);

          hintEl.style.display = 'block';
          hintEl.innerHTML =
            '📋 <b>排查建议：</b><br>' +
            '1. 确认 Discord 开发者后台 → OAuth2 → Redirects 中<b>一字不差</b>地添加了：<br>' +
            '<code>https://maricli1.github.io/Re0/auth-callback.html</code><br>' +
            '（注意 https、无末尾斜杠、大小写完全一致）<br>' +
            '2. 确认后<b>点击 Save Changes</b><br>' +
            '3. 如果已添加，尝试删除后重新添加并保存';

          sendToOpener({ error: error + (errorDesc ? ': ' + errorDesc : '') });
          return;
        }

        // ---- 没有 token ----
        if (!accessToken) {
          status.textContent = '❌ 未收到授权令牌';
          status.className = 'status err';
          detail.textContent = 'URL hash 中没有 access_token，可能浏览器不支持此流程';
          sendToOpener({ error: 'no_access_token_in_hash' });
          return;
        }

        // ---- 有 token，获取用户信息 ----
        log('Fetching /users/@me ...');
        fetch('https://discord.com/api/v10/users/@me', {
          headers: { Authorization: tokenType + ' ' + accessToken }
        })
        .then(function(resp) {
          log('API status: ' + resp.status);
          return resp.json().then(function(body) {
            log('API body: ' + JSON.stringify(body).substring(0, 200));
            if (!resp.ok) {
              throw new Error(body.message || body.error || 'HTTP ' + resp.status);
            }
            return body;
          });
        })
        .then(function(user) {
          log('Got user: ' + user.username + '#' + user.discriminator);
          status.textContent = '✅ ' + user.username;
          status.className = 'status ok';
          detail.textContent = '登录成功！窗口即将关闭...';
          sendToOpener({ user: user });
          setTimeout(function() { window.close(); }, 600);
        })
        .catch(function(err) {
          status.textContent = '❌ ' + err.message;
          status.className = 'status err';
          detail.textContent = '';
          sendToOpener({ error: err.message });
        });

      } catch(e) {
        status.textContent = '❌ 脚本异常';
        status.className = 'status err';
        detail.textContent = e.message;
        log('EXCEPTION: ' + e.message + '\n' + e.stack);
        sendToOpener({ error: e.message });
      }
    })();
  </script>
</body>
</html>
