<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Discord 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; background: #1a1625; color: #dcd1ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 20px;
    }
    .card { max-width: 500px; width: 100%; }
    .status { font-size: 1.15em; margin: 0 0 10px; }
    .err { color: #ff6b6b; }
    .ok { color: #6bff8a; }
    .info { color: #8070a8; font-size: 0.82em; margin: 3px 0; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <p id="status" class="status">⏳ 正在完成登录...</p>
    <p id="detail" class="info"></p>
  </div>
  <script>
    (function() {
      var status = document.getElementById('status');
      var detail = document.getElementById('detail');

      function finish(ok, text) {
        status.textContent = (ok ? '✅ ' : '❌ ') + text;
        status.className = ok ? 'status ok' : 'status err';
        if (ok) detail.textContent = '窗口正在关闭...';
        setTimeout(function() { window.close(); }, ok ? 400 : 2000);
      }

      // 发送给父窗口（原网页 iframe）
      function send(type, payload) {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: type, payload: payload }, '*');
          }
        } catch(e) {}
      }

      try {
        var hash = window.location.hash.substring(1);
        var p = new URLSearchParams(hash);
        var token = p.get('access_token'), tt = p.get('token_type');
        var err = p.get('error'), errDesc = p.get('error_description');

        if (err) {
          send('SAVE_ERROR', err + (errDesc ? ': ' + errDesc : ''));
          finish(false, err + (errDesc ? ': ' + errDesc : ''));
          return;
        }
        if (!token) {
          send('SAVE_ERROR', '未收到授权令牌');
          finish(false, '未收到授权令牌');
          return;
        }

        fetch('https://discord.com/api/v10/users/@me', {
          headers: { Authorization: (tt || 'Bearer') + ' ' + token }
        }).then(function(r) {
          return r.json().then(function(b) {
            if (!r.ok) throw new Error(b.message || b.error || 'HTTP ' + r.status);
            return b;
          });
        }).then(function(user) {
          send('SAVE_DATA', user);
          finish(true, user.username);
        }).catch(function(e) {
          send('SAVE_ERROR', e.message);
          finish(false, e.message);
        });
      } catch(e) {
        send('SAVE_ERROR', e.message);
        finish(false, e.message);
      }
    })();
  </script>
</body>
</html>
