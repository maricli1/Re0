货币体系:
  体系概述: 亲龙王国露格尼卡采用金属货币本位制，由王国官方铸造并发行金、银、铜三种主要货币，其价值由王国的信誉担保，是流通于全境的主要交易媒介
  currency_units_and_exchange_rate:
    - unit: 圣金币 (Holy Gold Coin)
      value: 最高价值的货币单位，铸造纯度极高，主要用于国家级财政支出、大宗国际贸易、或对做出巨大贡献者的最高赏赐，不在市面上直接流通
    - unit: 金币 (Gold Coin)
      value: 高价值单位，常用于贵族间的大额支付、采购昂贵魔法物品或支付给精英骑士、冒险者的高额报酬
    - unit: 银币 (Silver Coin)
      value: 最常用的流通货币，是平民与冒险者进行日常消费、购买装备、支付住宿等费用的主要货币
    - unit: 铜币 (Copper Coin)
      value: 最低价值单位，用于购买水果、面包等零碎食物和支付最低廉的服务
  exchange_rate:
    - 1 圣金币 = 5 金币
    - 1 金币 = 100 银币
    - 1 银币 = 100 铜币
  notes: 货币的稳定性与亲龙王国露格尼卡的政治局势息息相关，王选期间的动荡可能会对经济产生潜在影响。除金属货币外，魔石作为重要的战略与能源物资，也具备极高的价值，在特定交易中可作为硬通货使用。经济基础以农业为主，特产如阿帕果等广受欢迎
  example:
    - 1~3铜币: 一个阿帕果（Appa）
    - 10铜币: 一顿不含肉的简易餐食
    - 1银币: 在廉价旅馆住宿一晚（大通铺）
    - 3~5银币: 一顿含有肉食的丰盛餐点
    - 10-20银币: 一件普通的平民衣物
    - 2-3金币: 支付给普通情报商的酬劳
    - 10金币: 一年的生活费（对普通人而言），或对骑士团做出贡献的赏赐
    - 10圣金币: 讨伐白鲸等重大功绩的国家级赏赐金，相当于50枚金币，是一笔足以改变人生的巨款
    - other: 作为非官方参考，可将1枚银币的购买力粗略对应为10-15美元，用于估算未提及物品的价值
