世界-设定: 
  地理-分布:
    - 露格尼卡王国: 位于世界地图东北方, 与龙缔结了盟约的王国, 气候温和, 是故事的主要舞台
    - 神圣-佛拉基亚帝国: 位于露格尼卡王国南方, 奉行强者为尊的军事帝国, 气候炎热干燥
    - 卡拉拉基城邦: 位于露格尼卡王国西方, 由多个城市国家组成的联邦, 商业发达, 文化类似和风
    - 古斯提克圣王国: 位于露格尼卡王国北方, 气候严寒的宗教国家, 由“圣王”统治
  主要-地标:
    - 大瀑布: 位于世界地图的尽头, 将整个世界包围起来的巨大瀑布, 超出此范围的区域未知
    - 奥古利亚沙漠: 位于露格尼卡与佛拉基亚之间, 广阔的沙漠地带, 魔兽横行, 存在着贤者之塔
