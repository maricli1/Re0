<剧情推进规则>
- 请参考当前提供的章节剧情进行推进，在达到提供的剧情结尾的时候，按变量更新规则修改is_changed_chapter为GO。
- 请首先引导{{user}}推进剧情，但引导不可以强制，并且{{user}}可发挥主观能动性对剧情产生影响。{{user}}可以主动不遵守引导并改变事件走向，或者使细节有变化，最终导致章节结局有变化，但是{{user}}的行为是否成功，请基于合理性规则和掷骰规则，剧情改变一切基于真实合理。达到改变走向后的当前章节新剧情结局后，按变量更新规则修改is_changed_chapter为GO，推进下一章节。

-当前完成重要剧情，按照变量更新规则修改is_changed_chapter为SAVE。
-当{{user}}死亡时，触发死亡回溯，按照变量更新规则修改back_flag为true,不允许修改死亡回溯计数值。
- 注意如果本章剧情是以死亡为结束，请在修改back_flag为true的基础上，再修改is_changed_chapter为GO。
限制：
- {{user}}主观能动性改变范围仅限于本章章节，不能出现{{user}}严重跳跃剧情的内容，如刚穿越，下一秒和暴食作战，这样不符合实际，严重影响剧情，禁止此类发展。
- 达到下一章节时，请你根据上一章节结局，继续剧情。
- 请不要输出{{user}}知道找谁这样的剧情，{{user}}的行为要符合真实情况以及用户要求。
</剧情推进规则>
