- 世界观-背景历史:
  - 核心纪元-大灾厄: 距今约400年前，嫉妒魔女莎缇拉近乎毁灭世界，最终被龙神、剑圣与贤者联手封印
  - 王国基石-龙之盟约:
    - 缔结: 龙神沃尔迦尼卡与露格尼卡王国初代国王缔结盟约，承诺庇护王国以抵御灾厄
    - 影响: 王国在龙的庇护下得以延续，但同时也产生了对龙的过度依赖，限制了国家自主发展
  - 核心冲突-亚人战争:
    - 背景: 历史上人类与亚人（兽人、鬼族等）之间因歧视与资源争夺爆发过大规模战争
    - 现状: 战争虽已结束，但种族间的歧视与不信任根植于社会深层，是主要的社会矛盾之一
  - 近代历史-王族断绝:
    - 事件: 故事开始前，露格尼卡王国的国王及其所有直系继承人因不明疾病相继去世，导致王室血脉断绝
    - 后果: 国家陷入无主的政治真空，权力交替的合法性面临严峻挑战
  - 当前状况-王选:
    - 目的: 为解决王位继承问题，贤人会根据盟约与龙之启示，选出五位具有资格的候选人，通过一系列考验决定下一任国王
    - 核心舞台: 故事的主要政治冲突围绕着五位王选候选人及其骑士间的竞争与合作
